spring.application.name=galeri-seni

# =========================================================
# DATABASE CONFIGURATION (Disesuaikan untuk Railway)
# =========================================================
# Membaca URL, username, dan password secara dinamis dari dashboard Railway
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / HIBERNATE CONFIGURATION
# =========================================================
# Diubah ke 'update' agar Hibernate otomatis membuat/menyesuaikan tabel di Railway.
# Setelah berhasil deploy pertama kali, kamu bisa mengembalikannya ke 'validate' jika mau.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eksekusi script SQL otomatis saat aplikasi pertama kali dijalankan
spring.sql.init.mode=always

# =========================================================
# THYMELEAF CONFIGURATION
# =========================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =========================================================
# FILE UPLOAD CONFIGURATION
# =========================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================================
# SERVER CONFIGURATION (Disesuaikan untuk Railway)
# =========================================================
# Menggunakan port dinamis yang dialokasikan oleh Railway, jika tidak ada memakai 8081
server.port=${PORT:8081}