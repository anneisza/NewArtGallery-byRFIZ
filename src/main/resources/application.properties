# src/main/resources/application.properties

spring.application.name=galeri-seni

# Database (Menggunakan Environment Variables untuk Railway & Lokal)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/galeri_seni?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# TIPS: Ubah ke 'update' sementara kalau di Railway databasenya masih kosong, biar tabelnya otomatis dibuat.
# Jika databasenya sudah matang, baru pakai 'validate'.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
# redeploy trigger
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server (WAJIB diganti agar Railway bisa menentukan Port secara dinamis)
server.port=${PORT:8081}