<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Seniman — Art Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0a0a0f;
            --bg-glass: rgba(24, 24, 35, 0.45);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(79, 110, 247, 0.4);
            --text: #e0e0f0;
            --text-muted: #94a3b8;
            --accent: #4f6ef7;
            --accent-glow: rgba(79, 110, 247, 0.3);
            --red: #ef4444;
            --yellow: #eab308;
        }
        body {
            background-image: linear-gradient(rgba(10, 10, 15, 0.85), rgba(10, 10, 15, 0.85)),
                              url('https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* Konten Utama - Jarak Kiri Pas dengan Sidebar Fragment */
        .main-content { flex: 1; margin-left: 240px; padding: 3rem; animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.25rem; font-weight: 700; }
        .header h1 span { color: var(--accent); font-style: italic; }

        .card { background: var(--bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; margin-bottom: 1.5rem; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; text-align: left; margin-bottom: 1rem; }
        th { padding: 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); letter-spacing: 1px; font-weight: 700; }
        td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        /* Form Inputs */
        .form-group { margin-bottom: 1.5rem; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
        input[type="text"], textarea { width: 100%; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 0.9rem; transition: all 0.3s ease; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.06); box-shadow: 0 0 10px rgba(79, 110, 247, 0.2); }

        /* Styling Khusus Input File Gambar */
        input[type="file"] { width: 100%; padding: 0.6rem 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-family: inherit; font-size: 0.85rem; cursor: pointer; }
        input[type="file"]::-webkit-file-upload-button { background: var(--accent); border: none; color: white; padding: 0.35rem 1rem; border-radius: 4px; font-weight: 600; margin-right: 1rem; transition: background 0.2s; }
        input[type="file"]::-webkit-file-upload-button:hover { opacity: 0.9; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s ease; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }

        .btn-warning { background: rgba(234, 179, 8, 0.15); color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.3); margin-right: 0.25rem; }
        .btn-warning:hover { background: var(--yellow); color: #0a0a0f; }

        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: var(--red); color: white; }

        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); }
        .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

        /* Styling Modal Pop-up Edit */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.8);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #111118; border: 1px solid var(--border); width: 100%; max-width: 650px; border-radius: 12px; padding: 2.5rem; box-shadow: 0 30px 60px rgba(0,0,0,0.6); transform: scale(0.9); transition: all 0.3s ease; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div th:replace="~{layout/dashboard-sidebar :: admin-sidebar(active='seniman')}"></div>

<div class="main-content">
    <div class="header">
        <h1>Manajemen <span>Seniman</span></h1>
    </div>

    <div th:if="${successMessage}" style="background: rgba(34, 197, 94, 0.15); border: 1px solid #22c55e; color: #4ade80; padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 600;">
        ✅ <span th:text="${successMessage}">Pesan sukses di sini</span>
    </div>

    <div class="card">
        <div class="card-title">Daftar Seniman Terdaftar</div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>Nama</th>
                    <th>Spesialisasi</th>
                    <th>Biografi</th>
                    <th>Aksi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="artist : ${artists}">
                    <td th:text="${artist.name}" style="font-weight: 600;">Nama</td>
                    <td th:text="${artist.specialty}">Digital Artist</td>
                    <td th:text="${artist.bio}" style="max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Bio...</td>
                    <td>
                        <button type="button" class="btn btn-warning"
                                th:data-id="${artist.id}"
                                th:data-name="${artist.name}"
                                th:data-specialty="${artist.specialty}"
                                th:data-bio="${artist.bio}"
                                onclick="openEditModal(this)">
                            Edit
                        </button>

                        <form th:action="@{/admin/seniman/hapus/{id}(id=${artist.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Hapus seniman ini?')">Hapus</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(artists)}">
                    <td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem;">Belum ada seniman terdaftar.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Tambah Seniman Baru</div>
        <form th:action="@{/admin/seniman/tambah}" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Nama Seniman</label>
                    <input type="text" name="name" required placeholder="Nama lengkap seniman">
                </div>
                <div class="form-group">
                    <label>Spesialisasi</label>
                    <input type="text" name="specialty" placeholder="Digital Painting, Sculpture, Photography, dll.">
                </div>
            </div>
            <div class="form-group">
                <label>Upload Foto Profil</label>
                <input type="file" name="photoFile" accept="image/*">
            </div>
            <div class="form-group">
                <label>Atau Masukkan URL Foto</label>
                <input type="text" name="photoUrl" placeholder="https://example.com/foto.jpg">
            </div>
            <div class="form-group">
                <label>Biografi</label>
                <textarea name="bio" rows="4" placeholder="Biografi singkat mengenai sejarah perjalanan hidup dan karya seniman..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Tambah Seniman</button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 style="font-family: 'Playfair Display', serif;">Edit Data <span>Seniman</span></h2>
            <button type="button" class="btn btn-secondary" onclick="closeEditModal()" style="padding: 0.3rem 0.7rem;">✕</button>
        </div>

        <form id="editForm" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Nama Seniman</label>
                    <input type="text" id="editName" name="name" required>
                </div>
                <div class="form-group">
                    <label>Spesialisasi</label>
                    <input type="text" id="editSpecialty" name="specialty">
                </div>
            </div>
            <div class="form-group">
                <label>Ganti Foto (Upload File)</label>
                <input type="file" name="photoFile" accept="image/*">
            </div>
            <div class="form-group">
                <label>Atau Ganti dengan URL Foto</label>
                <input type="text" id="editPhotoUrl" name="photoUrl" placeholder="https://example.com/foto.jpg">
            </div>
            <div class="form-group">
                <label>Biografi</label>
                <textarea id="editBio" name="bio" rows="4"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Batal</button>
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openEditModal(button) {
        // 1. Ambil data lama dari baris tabel yang diklik lewat atribut data
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');
        const specialty = button.getAttribute('data-specialty');
        const bio = button.getAttribute('data-bio');

        // 2. Pasang Action URL Form tujuan secara dinamis
        document.getElementById('editForm').action = '/admin/seniman/edit/' + id;

        // 3. Masukkan data ke form di dalam modal pop-up
        document.getElementById('editName').value = name;
        document.getElementById('editSpecialty').value = specialty;
        document.getElementById('editBio').value = bio;

        // 4. Buka modal overlay ke depan layar
        document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
        // Sembunyikan modal overlay kembali
        document.getElementById('editModal').classList.remove('active');
    }
</script>

</body>
</html>
