<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Karya Seni — Art Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0a0a0f;
            --bg-glass: rgba(24, 24, 35, 0.45);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(79, 110, 247, 0.4);
            --text: #e0e0f0;
            --text-muted: #94a3b8;
            --accent: #4f6ef7;
            --accent-glow: rgba(79, 110, 247, 0.3);
            --red: #ef4444;
            --yellow: #eab308;
        }
        body {
            background-image: linear-gradient(rgba(10, 10, 15, 0.85), rgba(10, 10, 15, 0.85)),
                              url('https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* Konten Utama - Jarak Kiri Pas dengan Sidebar Fragment */
        .main-content { flex: 1; margin-left: 240px; padding: 3rem; animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.25rem; font-weight: 700; }
        .header h1 span { color: var(--accent); font-style: italic; }

        .card { background: var(--bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; margin-bottom: 1.5rem; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; text-align: left; margin-bottom: 1rem; }
        th { padding: 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); letter-spacing: 1px; font-weight: 700; }
        td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        /* Form Inputs */
        .form-group { margin-bottom: 1.5rem; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 0.9rem; transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.06); box-shadow: 0 0 10px rgba(79, 110, 247, 0.2); }

        /*atur dropdown*/
        select option {
            color: #2d3748;       /* Abu-abu gelap (Slate/Charcoal) */
            background: #f7fafc;  /* Latar belakang putih gading yang lembut */
        }
        /* Buttons */
        .btn { display: inline-flex; align-items: center; padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s ease; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }

        .btn-warning { background: rgba(234, 179, 8, 0.15); color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.3); margin-right: 0.25rem; }
        .btn-warning:hover { background: var(--yellow); color: #0a0a0f; }

        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: var(--red); color: white; }

        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); }
        .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

        /* Styling Modal Edit */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.8);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #111118; border: 1px solid var(--border); width: 100%; max-width: 650px; border-radius: 12px; padding: 2.5rem; box-shadow: 0 30px 60px rgba(0,0,0,0.6); transform: scale(0.9); transition: all 0.3s ease; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div th:replace="~{layout/dashboard-sidebar :: admin-sidebar(active='karyaseni')}"></div>

<div class="main-content">
    <div class="header">
        <h1>Manajemen <span>Karya Seni</span></h1>
    </div>

    <div class="card">
        <div class="card-title">Daftar Koleksi</div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>Judul</th>
                    <th>Seniman</th>
                    <th>Pameran</th>
                    <th>Tahun</th>
                    <th>Aksi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="aw : ${artworks}">
                    <td th:text="${aw.title}">Judul</td>
                    <td th:text="${aw.artist != null ? aw.artist.name : '-'}">Seniman</td>
                    <td th:text="${aw.exhibition != null ? aw.exhibition.title : '-'}">Pameran</td>
                    <td th:text="${aw.yearCreated}">2024</td>
                    <td>
                        <button type="button" class="btn btn-warning"
                                th:data-id="${aw.id}"
                                th:data-title="${aw.title}"
                                th:data-artist="${aw.artist != null ? aw.artist.id : ''}"
                                th:data-exhibition="${aw.exhibition != null ? aw.exhibition.id : ''}"
                                th:data-year="${aw.yearCreated}"
                                th:data-image="${aw.imageUrl}"
                                th:data-desc="${aw.description}"
                                onclick="openEditModal(this)">
                            Edit
                        </button>

                        <form th:action="@{/admin/karya-seni/hapus/{id}(id=${aw.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Hapus karya ini?')">Hapus</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(artworks)}">
                    <td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem;">Belum ada data karya seni.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Tambah Karya Seni Baru</div>
        <form th:action="@{/admin/karya-seni/tambah}" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Judul Karya</label>
                    <input type="text" name="title" required placeholder="Contoh: Mona Lisa">
                </div>
                <div class="form-group">
                    <label>Seniman Pembuat</label>
                    <select name="artistId" required>
                        <option value="">-- Pilih Seniman --</option>
                        <option th:each="a : ${artists}" th:value="${a.id}" th:text="${a.name}">Seniman</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Pameran</label>
                    <select name="exhibitionId">
                        <option value="">-- Tidak terkait pameran --</option>
                        <option th:each="e : ${exhibitions}" th:value="${e.id}" th:text="${e.title}">Pameran</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tahun Penciptaan</label>
                    <input type="number" name="yearCreated" placeholder="2024">
                </div>
            </div>

                <!-- Ganti input gambar jadi 2 opsi -->
                <div class="form-group">
                    <label>Upload File Gambar</label>
                    <input type="file" name="imageFile" accept="image/*">
                </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea name="description" rows="4" placeholder="Deskripsi kuratorial mengenai makna seni..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Tambah Karya</button>
            </form>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 style="font-family: 'Playfair Display', serif;">Edit Data <span>Karya Seni</span></h2>
            <button type="button" class="btn btn-secondary" onclick="closeEditModal()" style="padding: 0.3rem 0.7rem;">✕</button>
        </div>

        <!-- Tambah enctype di form edit -->
        <form id="editForm" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Judul Karya</label>
                    <input type="text" id="editTitle" name="title" required>
                </div>
                <div class="form-group">
                    <label>Seniman Pembuat</label>
                    <select id="editArtistId" name="artistId" required>
                        <option value="">-- Pilih Seniman --</option>
                        <option th:each="a : ${artists}" th:value="${a.id}" th:text="${a.name}">Seniman</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Pameran</label>
                    <select id="editExhibitionId" name="exhibitionId">
                        <option value="">-- Tidak terkait pameran --</option>
                        <option th:each="e : ${exhibitions}" th:value="${e.id}" th:text="${e.title}">Pameran</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tahun Penciptaan</label>
                    <input type="number" id="editYear" name="yearCreated">
                </div>
            </div>


                <!-- Ganti input URL Gambar jadi 2 opsi -->
                <div class="form-group">
                    <label>Upload File Gambar Baru</label>
                    <input type="file" name="imageFile" accept="image/*">
                </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea id="editDescription" name="description" rows="4"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Batal</button>
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
            </div>
            </form> </form>
    </div>
</div>

<script>
    function openEditModal(button) {
     // 1. Ambil data lama dari atribut tag tombol yang diklik
     const id = button.getAttribute('data-id');
     const title = button.getAttribute('data-title');
     const artistId = button.getAttribute('data-artist');
     const exhibitionId = button.getAttribute('data-exhibition');
     const year = button.getAttribute('data-year');
     const desc = button.getAttribute('data-desc');

     // 2. Set action URL Form secara dinamis mengarah ke endpoint update id-nya
     document.getElementById('editForm').action = '/admin/karya-seni/edit/' + id;

     // 3. Masukkan data lama ke dalam input field form modal
     document.getElementById('editTitle').value = title;
     document.getElementById('editArtistId').value = artistId;
     document.getElementById('editExhibitionId').value = exhibitionId;
     document.getElementById('editYear').value = year;
     document.getElementById('editDescription').value = desc;

     // 💡 Baris 'editImageUrl' sudah dihapus karena input file tidak bisa diisi value text teks lama

     // 4. Munculkan modal overlay ke layar
     document.getElementById('editModal').classList.add('active');
 }
     function closeEditModal() {
         // Sembunyikan kembali modal overlay
         document.getElementById('editModal').classList.remove('active');
     }
</script>

</body>
</html>
