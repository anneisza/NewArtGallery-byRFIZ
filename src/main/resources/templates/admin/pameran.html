<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pameran — Art Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0a0a0f;
            --bg-glass: rgba(24, 24, 35, 0.45);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(79, 110, 247, 0.4);
            --text: #e0e0f0;
            --text-muted: #94a3b8;
            --accent: #4f6ef7;
            --accent-glow: rgba(79, 110, 247, 0.3);
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
        }
        body {
            background-image: linear-gradient(rgba(10, 10, 15, 0.85), rgba(10, 10, 15, 0.85)),
                              url('https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* Konten Utama - Jarak Kiri Pas dengan Sidebar Fragment */
        .main-content { flex: 1; margin-left: 240px; padding: 3rem; animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.25rem; font-weight: 700; }
        .header h1 span { color: var(--accent); font-style: italic; }

        .card { background: var(--bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; margin-bottom: 1.5rem; }

        table { width: 100%; border-collapse: collapse; text-align: left; margin-bottom: 1rem; }
        th { padding: 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); letter-spacing: 1px; font-weight: 700; }
        td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-upcoming { background: rgba(234, 179, 8, 0.15); color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.3); }
        .badge-ongoing { background: rgba(34, 197, 94, 0.15); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.3); }
        .badge-past { background: rgba(255, 255, 255, 0.1); color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.15); }

        .form-group { margin-bottom: 1.5rem; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 0.9rem; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.06); box-shadow: 0 0 10px rgba(79, 110, 247, 0.2); }

        /* Atur warna teks pilihan dropdown menjadi gelap */
        select option {
            color: #2d3748;
            background: #f7fafc;
        }

        /* Buttons Styling */
        .btn { display: inline-flex; align-items: center; padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s ease; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }

        .btn-warning { background: rgba(234, 179, 8, 0.15); color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.3); margin-right: 0.25rem; }
        .btn-warning:hover { background: var(--yellow); color: #0a0a0f; }

        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: var(--red); color: white; }

        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); }
        .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

        /* Styling Modal Pop-up Edit */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.8);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #111118; border: 1px solid var(--border); width: 100%; max-width: 650px; border-radius: 12px; padding: 2.5rem; box-shadow: 0 30px 60px rgba(0,0,0,0.6); transform: scale(0.9); transition: all 0.3s ease; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div th:replace="~{layout/dashboard-sidebar :: admin-sidebar(active='pameran')}"></div>

<div class="main-content">
    <div class="header">
        <h1>Manajemen <span>Pameran Seni</span></h1>
    </div>

    <div th:if="${successMessage}" style="background: rgba(34, 197, 94, 0.15); border: 1px solid #22c55e; color: #4ade80; padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 600;">
        <span th:text="${successMessage}">Pesan sukses</span>
    </div>

    <div class="card">
        <div class="card-title">Event Pameran Seni</div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>Judul Pameran</th>
                    <th>Lokasi</th>
                    <th>Tanggal</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${exhibitions}">
                    <td th:text="${e.title}" style="font-weight: 600;">Pameran Seni Kontemporer</td>
                    <td th:text="${e.location}">Main Hall Room</td>
                    <td>
                        <span th:text="${e.startDate}">2026-01-01</span> s/d
                        <span th:text="${e.endDate}">2026-02-01</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${e.status.name() == 'UPCOMING'} ? 'badge-upcoming' : (${e.status.name() == 'ONGOING'} ? 'badge-ongoing' : 'badge-past')"
                              th:text="${e.status}">Ongoing</span>
                    </td>
                    <td>
                        <button th:if="${e.status.name() != 'PAST'}"
                                type="button" class="btn btn-warning"
                                th:data-id="${e.id}"
                                th:data-title="${e.title}"
                                th:data-location="${e.location}"
                                th:data-start="${e.startDate}"
                                th:data-end="${e.endDate}"
                                th:data-status="${e.status.name()}"
                                th:data-desc="${e.description}"
                                onclick="openEditModal(this)">
                            Edit
                        </button>

                        <form th:action="@{/admin/pameran/hapus/{id}(id=${e.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Hapus pameran ini?')">Hapus</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(exhibitions)}">
                    <td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem;">Belum ada pameran terdaftar.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Buat Event Pameran Baru</div>
        <form th:action="@{/admin/pameran/tambah}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Judul Pameran</label>
                    <input type="text" name="title" required placeholder="Contoh: Future Neo Exhibition">
                </div>
                <div class="form-group">
                    <label>Lokasi Galeri</label>
                    <input type="text" name="location" placeholder="Contoh: Grand Hall Floor 2">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tanggal Mulai</label>
                    <input type="date" name="startDate">
                </div>
                <div class="form-group">
                    <label>Tanggal Selesai</label>
                    <input type="date" name="endDate">
                </div>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="UPCOMING">Upcoming</option>
                    <option value="ONGOING">Ongoing</option>
                    <option value="PAST">Past</option>
                </select>
            </div>
            <div class="form-group">
                <label>Deskripsi Acara</label>
                <textarea name="description" rows="4" placeholder="Detail deskripsi mengenai kurasi pameran, konsep, atau jam kunjungan khusus..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Tambah Pameran</button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 style="font-family: 'Playfair Display', serif;">Edit Event <span>Pameran</span></h2>
            <button type="button" class="btn btn-secondary" onclick="closeEditModal()" style="padding: 0.3rem 0.7rem;">✕</button>
        </div>

        <form id="editForm" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Judul Pameran</label>
                    <input type="text" id="editTitle" name="title" required>
                </div>
                <div class="form-group">
                    <label>Lokasi Galeri</label>
                    <input type="text" id="editLocation" name="location">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tanggal Mulai</label>
                    <input type="date" id="editStartDate" name="startDate">
                </div>
                <div class="form-group">
                    <label>Tanggal Selesai</label>
                    <input type="date" id="editEndDate" name="endDate">
                </div>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="editStatus" name="status">
                    <option value="UPCOMING">Upcoming</option>
                    <option value="ONGOING">Ongoing</option>
                    <option value="PAST">Past</option>
                </select>
            </div>
            <div class="form-group">
                <label>Deskripsi Acara</label>
                <textarea id="editDescription" name="description" rows="4"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Batal</button>
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openEditModal(button) {
        const id = button.getAttribute('data-id');
        const title = button.getAttribute('data-title');
        const location = button.getAttribute('data-location');
        const startDate = button.getAttribute('data-start');
        const endDate = button.getAttribute('data-end');
        const status = button.getAttribute('data-status');
        const desc = button.getAttribute('data-desc');

        document.getElementById('editForm').action = '/admin/pameran/edit/' + id;

        document.getElementById('editTitle').value = title;
        document.getElementById('editLocation').value = location;
        document.getElementById('editStartDate').value = startDate;
        document.getElementById('editEndDate').value = endDate;
        document.getElementById('editStatus').value = status;
        document.getElementById('editDescription').value = desc;

        document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
    }
</script>

</body>
</html>
