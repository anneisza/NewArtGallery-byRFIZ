<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atribusi AI — Art Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0a0a0f;
            --bg-glass: rgba(24, 24, 35, 0.45);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(124, 58, 237, 0.4);
            --text: #e0e0f0;
            --text-muted: #94a3b8;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.3);
            --yellow: #eab308;
            --red: #ef4444;
        }
        body {
            background-image: linear-gradient(rgba(10, 10, 15, 0.85), rgba(10, 10, 15, 0.85)),
                              url('https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        .main-content { flex: 1; margin-left: 240px; padding: 3rem; animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.25rem; font-weight: 700; }
        .header h1 span { color: var(--accent); font-style: italic; }

        .card { background: var(--bg-glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; margin-bottom: 1.5rem; }

        table { width: 100%; border-collapse: collapse; text-align: left; margin-bottom: 1rem; }
        th { padding: 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); letter-spacing: 1px; font-weight: 700; }
        td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .form-group { margin-bottom: 1.5rem; }
        input[type="text"], select, textarea { width: 100%; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 0.9rem; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.06); box-shadow: 0 0 10px rgba(124, 58, 237, 0.2); }

        select option { color: #2d3748; background: #f7fafc; }

        /* Buttons Style */
        .btn { display: inline-flex; align-items: center; padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s ease; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }

        .btn-warning { background: rgba(234, 179, 8, 0.15); color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.3); margin-right: 0.25rem; }
        .btn-warning:hover { background: var(--yellow); color: #0a0a0f; }

        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: var(--red); color: white; }

        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); }
        .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

        /* Modal Layout */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.8);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #111118; border: 1px solid var(--border); width: 100%; max-width: 600px; border-radius: 12px; padding: 2.5rem; box-shadow: 0 30px 60px rgba(0,0,0,0.6); transform: scale(0.9); transition: all 0.3s ease; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div th:replace="~{layout/dashboard-sidebar :: kurator-sidebar(active='atribusiai')}"></div>

<div class="main-content">
    <div class="header">
        <h1>Audit Transparansi <span>Atribusi AI</span></h1>
    </div>

    <div th:if="${successMessage}" style="background: rgba(34, 197, 94, 0.15); border: 1px solid #22c55e; color: #4ade80; padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 600;">
         <span th:text="${successMessage}">Pesan sukses</span>
    </div>

    <div class="card">
        <div class="card-title">Daftar Log Keaslian Karya Seni</div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>Karya Seni</th>
                    <th>Tingkat Intervensi AI</th>
                    <th>Perangkat Lunak</th>
                    <th>Aksi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ai : ${attributions}">
                    <td th:text="${ai.artwork.title}" style="font-weight: 600;">Karya Seni</td>
                    <td th:text="${ai.involvementLevel}">PURE_HUMAN</td>
                    <td th:text="${ai.softwareUsed != null and ai.softwareUsed != '' ? ai.softwareUsed : '-'}">Midjourney v6</td>
                    <td>
                        <button type="button" class="btn btn-warning"
                                th:data-id="${ai.id}"
                                th:data-artwork-id="${ai.artwork.id}"
                                th:data-level="${ai.involvementLevel.name()}"
                                th:data-software="${ai.softwareUsed}"
                                th:data-prompt="${ai.promptText}"
                                onclick="openEditModal(this)">
                            Edit
                        </button>
                        <form th:action="@{/kurator/atribusi-ai/hapus/{id}(id=${ai.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Hapus log sertifikasi deklarasi AI ini?')">Hapus</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(attributions)}">
                    <td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem;">Belum ada sertifikasi integritas AI tersimpan.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Form Deklarasi AI Gen & Hak Cipta</div>
        <form th:action="@{/kurator/atribusi-ai/simpan}" method="post">
            <div class="form-group">
                <label>Judul Karya Seni</label>
                <select name="artworkId" required>
                    <option value="">-- Pilih karya --</option>
                    <option th:each="aw : ${artworks}" th:value="${aw.id}" th:text="${aw.title}">Karya</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tingkat Keterlibatan AI</label>
                <select name="involvementLevel" required>
                    <option value="PURE_HUMAN">Pure Human Art (100% Buatan Manusia murni)</option>
                    <option value="AI_ASSISTED">AI-Assisted (Sketsa manusia dibantu AI)</option>
                    <option value="FULLY_AI_GENERATED">Fully AI-Generated (Sintesis Prompt Murni AI)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Software Kecerdasan Buatan yang Digunakan</label>
                <input type="text" name="softwareUsed" placeholder="Contoh: Stable Diffusion, Midjourney, DALL-E, Firefly">
            </div>
            <div class="form-group">
                <label>Log Prompt Asli / Teknik Instruksi Rekayasa</label>
                <textarea name="promptText" rows="3" placeholder="Tuliskan konfigurasi prompt utama jika terdeteksi unsur AI..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Simpan Atribusi AI</button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 style="font-family: 'Playfair Display', serif;">Edit Audit <span>Atribusi AI</span></h2>
            <button type="button" class="btn btn-secondary" onclick="closeEditModal()" style="padding: 0.3rem 0.7rem;">✕</button>
        </div>
        <form id="editForm" method="post">
            <div class="form-group">
                <label>Judul Karya Seni</label>
                <select id="editArtworkId" name="artworkId" required style="pointer-events: none; opacity: 0.6; background: rgba(255,255,255,0.02);">
                    <option th:each="aw : ${artworks}" th:value="${aw.id}" th:text="${aw.title}">Karya</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tingkat Keterlibatan AI</label>
                <select id="editInvolvementLevel" name="involvementLevel" required>
                    <option value="PURE_HUMAN">Pure Human Art (100% Buatan Manusia murni)</option>
                    <option value="AI_ASSISTED">AI-Assisted (Sketsa manusia dibantu AI)</option>
                    <option value="FULLY_AI_GENERATED">Fully AI-Generated (Sintesis Prompt Murni AI)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Software Kecerdasan Buatan</label>
                <input type="text" id="editSoftwareUsed" name="softwareUsed">
            </div>
            <div class="form-group">
                <label>Log Prompt Asli / Teknik Instruksi</label>
                <textarea id="editPromptText" name="promptText" rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Batal</button>
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openEditModal(button) {
        const id = button.getAttribute('data-id');
        const artworkId = button.getAttribute('data-artwork-id');
        const level = button.getAttribute('data-level');
        const software = button.getAttribute('data-software');
        const prompt = button.getAttribute('data-prompt');

        document.getElementById('editForm').action = '/kurator/atribusi-ai/edit/' + id;
        document.getElementById('editArtworkId').value = artworkId;
        document.getElementById('editInvolvementLevel').value = level;
        document.getElementById('editSoftwareUsed').value = software;
        document.getElementById('editPromptText').value = prompt;

        document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
    }
</script>
</body>
</html>
